<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AN Dev Studio — Setup</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 28px 36px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
  }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 36px;
  }

  /* Path selection screen */
  .path-screen { max-width: 520px; }
  .path-screen label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .path-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .path-row input {
    flex: 1;
    height: 38px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px;
  }
  .path-row button, .primary-btn {
    height: 38px;
    padding: 0 16px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .path-row button:hover, .primary-btn:hover { background: var(--accent-hover); }
  .primary-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

  /* Progress steps */
  .steps { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
  }
  .step.active { background: var(--surface); }
  .step-dot {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    background: #e2e8f0; color: var(--muted);
  }
  .step-dot.done { background: var(--success); color: #fff; }
  .step-dot.running { background: var(--accent); color: #fff; animation: pulse 1.2s ease-in-out infinite; }
  .step-dot.error { background: var(--error); color: #fff; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .step-label { font-size: 13.5px; font-weight: 600; flex: 1; }
  .step-detail { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  /* Log */
  .log {
    background: #0f172a;
    color: #cbd5e1;
    border-radius: 10px;
    padding: 14px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 11.5px;
    height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    margin-bottom: 16px;
  }

  /* Suggestion panel */
  .suggestion {
    background: #fef3c7;
    border: 1px solid #fcd34d;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .suggestion.error-box { background: #fee2e2; border-color: #fca5a5; }
  .suggestion h3 { margin: 0 0 6px; font-size: 13px; font-weight: 700; }
  .suggestion p { margin: 0 0 10px; font-size: 12.5px; line-height: 1.5; color: #78350f; }
  .suggestion.error-box p { color: #7f1d1d; }
  .suggestion .actions { display: flex; gap: 8px; }
  .suggestion button {
    height: 32px; padding: 0 14px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .suggestion .retry-btn { background: var(--accent); color: #fff; }
  .suggestion .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text); }

  footer {
    padding: 16px 36px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>AN Dev Studio</h1>
  <p id="subtitle">Setting things up…</p>
</header>

<div class="content">

  <!-- Screen 1: install path selection (first run only) -->
  <div id="path-screen" class="path-screen hidden">
    <label for="path-input">Install / project location</label>
    <div class="path-row">
      <input id="path-input" type="text" placeholder="D:\Development\an-dev-studio" />
      <button id="browse-btn">Browse…</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin:0 0 20px;">
      This is where the project source, dependencies, and build output will live. Pick a drive with a few GB of
      free space.
    </p>
    <button class="primary-btn" id="path-continue-btn">Continue</button>
  </div>

  <!-- Screen 2: progress wizard -->
  <div id="progress-screen" class="hidden">
    <div class="steps" id="steps"></div>
    <div id="suggestion-slot"></div>
    <div class="log" id="log"></div>
  </div>

</div>

<footer id="footer" class="hidden">
  <button class="primary-btn" id="launch-btn" disabled>Launch AN Dev Studio</button>
</footer>

<script>
  const STEP_DEFS = [
    { id: "check-git", label: "Checking for git" },
    { id: "fetch", label: "Fetching latest code" },
    { id: "install", label: "Installing dependencies" },
    { id: "build", label: "Building the app" },
  ];

  const stepsEl = document.getElementById("steps");
  const logEl = document.getElementById("log");
  const subtitleEl = document.getElementById("subtitle");
  const suggestionSlot = document.getElementById("suggestion-slot");
  const footerEl = document.getElementById("footer");
  const launchBtn = document.getElementById("launch-btn");
  const pathScreen = document.getElementById("path-screen");
  const progressScreen = document.getElementById("progress-screen");

  const stepState = {};
  STEP_DEFS.forEach((s) => { stepState[s.id] = "pending"; });

  function renderSteps() {
    stepsEl.innerHTML = STEP_DEFS.map((s) => {
      const state = stepState[s.id];
      const dotClass = state === "done" ? "done" : state === "running" ? "running" : state === "error" ? "error" : "";
      const dotChar = state === "done" ? "✓" : state === "error" ? "✕" : state === "running" ? "" : "";
      return `
        <div class="step ${state === "running" ? "active" : ""}">
          <div class="step-dot ${dotClass}">${dotChar}</div>
          <div class="step-label">${s.label}</div>
        </div>
      `;
    }).join("");
  }
  renderSteps();

  function appendLog(line) {
    logEl.textContent += line + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  function showSuggestion(title, message, canRetry) {
    suggestionSlot.innerHTML = `
      <div class="suggestion error-box">
        <h3>${title}</h3>
        <p>${message}</p>
        <div class="actions">
          ${canRetry ? '<button class="retry-btn" id="retry-btn">Retry this step</button>' : ""}
          <button class="copy-btn" id="copy-log-btn">Copy log</button>
        </div>
      </div>
    `;
    const retryBtn = document.getElementById("retry-btn");
    if (retryBtn) retryBtn.addEventListener("click", () => window.__launcher.retry());
    document.getElementById("copy-log-btn").addEventListener("click", () => {
      navigator.clipboard?.writeText(logEl.textContent).catch(() => {});
    });
  }

  function clearSuggestion() {
    suggestionSlot.innerHTML = "";
  }

  // UI-only helpers, driven by events coming from Rust (see the bridge below).
  window.__launcherUI = {
    showPathScreen() {
      pathScreen.classList.remove("hidden");
      progressScreen.classList.add("hidden");
      footerEl.classList.add("hidden");
      subtitleEl.textContent = "Choose where to set this up";
    },
    showProgressScreen() {
      pathScreen.classList.add("hidden");
      progressScreen.classList.remove("hidden");
      footerEl.classList.remove("hidden");
      subtitleEl.textContent = "Setting things up…";
    },
    setStepState(stepId, state) {
      if (!(stepId in stepState)) return;
      stepState[stepId] = state;
      renderSteps();
    },
    log(line) {
      appendLog(line);
    },
    fail(stepLabel, message, canRetry) {
      subtitleEl.textContent = "Something needs your attention";
      showSuggestion(`${stepLabel} failed`, message, canRetry);
    },
    succeed() {
      clearSuggestion();
      subtitleEl.textContent = "Ready!";
      launchBtn.disabled = false;
      launchBtn.textContent = "Launch AN Dev Studio";
    },
  };

  // ---------------------------------------------------------------------
  // Tauri bridge — waits for window.__TAURI__ to actually be ready before
  // using it (a known Windows timing issue means it can be undefined
  // during top-level script execution even with withGlobalTauri enabled;
  // see tauri-apps/tauri#12990), then wires setup-progress events emitted
  // from Rust to the UI functions above, and exposes invoke-backed actions
  // for the buttons.
  // ---------------------------------------------------------------------

  function waitForTauri(cb, attemptsLeft = 100) {
    if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.event) {
      cb(window.__TAURI__);
      return;
    }
    if (attemptsLeft <= 0) {
      appendLog("[launcher] Tauri bridge never became available — this window may not be running inside the desktop shell.");
      return;
    }
    setTimeout(() => waitForTauri(cb, attemptsLeft - 1), 50);
  }

  let lastFailedStep = null;

  waitForTauri((tauri) => {
    const { invoke } = tauri.core;
    const { listen } = tauri.event;

    // Rust emits "setup-progress" events shaped like:
    // { step: "fetch", state: "running" | "done" | "error", message?: string, detail?: string }
    listen("setup-progress", (event) => {
      const { step, state, message, detail } = event.payload || {};
      if (step) window.__launcherUI.setStepState(step, state);
      if (message) window.__launcherUI.log(message);
      if (state === "error") {
        lastFailedStep = step;
        const stepDef = STEP_DEFS.find((s) => s.id === step);
        window.__launcherUI.fail(stepDef ? stepDef.label : step, detail || message || "Unknown error.", true);
      }
    });

    listen("setup-complete", () => {
      window.__launcherUI.succeed();
    });

    listen("setup-need-path", () => {
      window.__launcherUI.showPathScreen();
    });

    window.__launcher = {
      async retry() {
        clearSuggestion();
        if (lastFailedStep) {
          window.__launcherUI.setStepState(lastFailedStep, "running");
        }
        try {
          await invoke("retry_setup_step", { step: lastFailedStep });
        } catch (err) {
          appendLog("[launcher] retry failed to start: " + String(err));
        }
      },
      async launch() {
        launchBtn.disabled = true;
        launchBtn.textContent = "Launching…";
        try {
          await invoke("launch_app");
        } catch (err) {
          appendLog("[launcher] launch failed: " + String(err));
          launchBtn.disabled = false;
          launchBtn.textContent = "Launch AN Dev Studio";
        }
      },
    };

    document.getElementById("path-continue-btn").addEventListener("click", async () => {
      const path = document.getElementById("path-input").value.trim();
      if (!path) return;
      window.__launcherUI.showProgressScreen();
      try {
        await invoke("start_setup", { installPath: path });
      } catch (err) {
        appendLog("[launcher] failed to start setup: " + String(err));
      }
    });

    document.getElementById("browse-btn").addEventListener("click", async () => {
      try {
        const chosen = await invoke("pick_install_folder");
        if (chosen) document.getElementById("path-input").value = chosen;
      } catch (err) {
        appendLog("[launcher] folder picker failed: " + String(err));
      }
    });

    // Tell Rust the UI is ready to receive events — Rust waits for this
    // before emitting the first setup-progress event, so nothing is lost
    // to a race between window creation and script execution.
    invoke("launcher_ready").catch((err) => {
      appendLog("[launcher] failed to signal ready: " + String(err));
    });
  });
</script>

</body>
</html>
